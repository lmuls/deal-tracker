<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shop — Spring Sale</title>
    <!-- Open Graph sale price -->
    <meta property="og:price:amount" content="29.99"/>
    <meta property="og:description" content="Spring Sale — up to 50% off everything"/>
    <!-- JSON-LD Offer -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Offer",
      "name": "Spring Sale 2025",
      "description": "Get up to 50% off all products this spring",
      "price": "29.99",
      "priceCurrency": "USD",
      "validThrough": "2025-04-30T23:59:59Z"
    }
    </script>
</head>
<body>
<h1>Spring Sale</h1>
<p>Get up to 50% off everything in our spring collection.</p>
</body>
</html>

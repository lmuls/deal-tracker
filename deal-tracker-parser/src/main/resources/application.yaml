spring:
  application:
    name: deal-tracker-parser
  datasource:
    url: jdbc:postgresql://localhost:5432/dealtracker
    username: dealtracker
    password: dealtracker
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

parser:
  snapshot-dir: /data/snapshots
  default-locale: en
  poll-interval-ms: 30000
  llm:
    enabled: false                    # opt-in; set to true and provide api-key to activate
    api-key: ${ANTHROPIC_API_KEY:}
    model: claude-haiku-4-5-20251001
    max-tokens: 600
    page-text-max-chars: 4000
    base-url: https://api.anthropic.com

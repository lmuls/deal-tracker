spring:
  application:
    name: deal-tracker-parser
  datasource:
    url: jdbc:postgresql://localhost:5432/dealtracker
    username: dealtracker
    password: dealtracker
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

parser:
  snapshot-dir: /data/snapshots
  default-locale: en
  poll-interval-ms: 30000

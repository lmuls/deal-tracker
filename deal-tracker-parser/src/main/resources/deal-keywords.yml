locales:
  en:
    percentage_discount:
      patterns:
        - '\d{1,2}%\s*(off|discount|savings)'
        - 'save\s+\d{1,2}%'
        - 'up\s+to\s+\d{1,2}%\s+off'
      keywords:
        - "percent off"
        - "half price"
        - "half off"
    fixed_amount_discount:
      patterns:
        - '(save|get)\s+[\$£€]\s*\d+'
        - '[\$£€]\s*\d+\s+off'
      keywords:
        - "dollars off"
        - "money off"
    sale_event:
      keywords:
        - "spring sale"
        - "summer sale"
        - "winter sale"
        - "autumn sale"
        - "flash sale"
        - "clearance sale"
        - "black friday"
        - "cyber monday"
        - "end of season"
        - "site-wide sale"
        - "sitewide sale"
        - "store-wide sale"
        - "grand opening sale"
        - "anniversary sale"
        - "holiday sale"
        - "warehouse sale"
        - "everything must go"
    promotional:
      keywords:
        - "free shipping"
        - "free delivery"
        - "buy one get one"
        - "BOGO"
        - "gift with purchase"
        - "limited time offer"
        - "special offer"
        - "exclusive offer"
        - "members only"
        - "today only"
        - "this weekend only"
    coupon:
      patterns:
        - '(use|enter|apply|code|coupon|promo)\s*:?\s*[A-Z0-9]{3,}'
      keywords:
        - "promo code"
        - "coupon code"
        - "discount code"
        - "voucher code"
        - "use code"
    urgency:
      keywords:
        - "ends today"
        - "ends tonight"
        - "ends soon"
        - "last chance"
        - "while supplies last"
        - "limited stock"
        - "don't miss out"
        - "hurry"
        - "final hours"
        - "selling fast"

  no:
    percentage_discount:
      patterns:
        - '\d{1,2}%\s*(rabatt|avslag)'
        - 'spar\s+\d{1,2}%'
        - 'opptil\s+\d{1,2}%'
      keywords:
        - "prosent rabatt"
        - "halv pris"
    fixed_amount_discount:
      patterns:
        - 'spar\s+\d+\s*(kr|NOK)'
        - '\d+\s*(kr|NOK)\s+(rabatt|avslag)'
      keywords:
        - "kroner rabatt"
        - "kroner avslag"
    sale_event:

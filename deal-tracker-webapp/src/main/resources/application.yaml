server:
  forward-headers-strategy: native

spring:
  application:
    name: deal-tracker-webapp
  datasource:
    url: jdbc:postgresql://localhost:5432/dealtracker
    username: dealtracker
    password: dealtracker
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  # Mail — set MAIL_HOST to activate (e.g. localhost with MailHog on port 1025)
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:1025}
    default-encoding: UTF-8

webapp:
  dispatch-interval-ms: 30000
  default-user-email: admin@dealtracker.local
  daily-digest-cron: "0 0 8 * * *"

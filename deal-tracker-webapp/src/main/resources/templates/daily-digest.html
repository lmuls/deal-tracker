<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Your Daily Deals Digest</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        .card { background: #fff; border-radius: 8px; padding: 24px; max-width: 640px; margin: 0 auto; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
        h1 { color: #1976d2; font-size: 20px; border-bottom: 2px solid #1976d2; padding-bottom: 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th { background: #f5f5f5; text-align: left; padding: 8px 12px; font-size: 12px; color: #757575; text-transform: uppercase; }
        td { padding: 10px 12px; border-bottom: 1px solid #eeeeee; font-size: 14px; vertical-align: top; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }
        .HIGH   { background: #e8f5e9; color: #2e7d32; }
        .MEDIUM { background: #fff8e1; color: #f57f17; }
        .LOW    { background: #fce4ec; color: #b71c1c; }
        .footer { margin-top: 24px; font-size: 12px; color: #9e9e9e; text-align: center; }
    </style>
</head>
<body>
<div class="card">
    <h1>Daily Deals Digest</h1>
    <p>Here are the <strong th:text="${deals.size()}">N</strong> new deal(s) detected in the last 24 hours.</p>

    <table>
        <thead>
        <tr>
            <th>Site</th>
            <th>Deal</th>
            <th>Confidence</th>
            <th>Detected</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="deal : ${deals}">
            <td th:text="${deal.trackedSite.name}">Site</td>
            <td>
                <div th:text="${deal.title}">Title</div>
                <div style="color:#757575;font-size:12px;" th:if="${deal.description}" th:text="${deal.description}">Desc</div>
            </td>
            <td>
                <span class="badge" th:classappend="${deal.confidence}" th:text="${deal.confidence}">HIGH</span>
            </td>
            <td th:text="${#temporals.format(deal.detectedAt, 'HH:mm')}">Time</td>
        </tr>
        </tbody>
    </table>
</div>
<div class="footer">Deal Tracker daily digest for <span th:text="${userEmail}">user</span>.</div>
</body>
</html>

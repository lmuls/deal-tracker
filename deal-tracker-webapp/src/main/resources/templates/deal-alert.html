<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>New Deal Detected</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        .card { background: #fff; border-radius: 8px; padding: 24px; max-width: 560px; margin: 0 auto; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
        .header { border-bottom: 2px solid #1976d2; padding-bottom: 12px; margin-bottom: 16px; }
        .header h1 { color: #1976d2; font-size: 20px; margin: 0; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .HIGH   { background: #e8f5e9; color: #2e7d32; }
        .MEDIUM { background: #fff8e1; color: #f57f17; }
        .LOW    { background: #fce4ec; color: #b71c1c; }
        .field { margin: 8px 0; }
        .label { color: #757575; font-size: 12px; text-transform: uppercase; }
        .value { font-size: 15px; color: #212121; }
        .footer { margin-top: 24px; font-size: 12px; color: #9e9e9e; text-align: center; }
        a.btn { display: inline-block; margin-top: 16px; padding: 10px 20px; background: #1976d2; color: #fff; text-decoration: none; border-radius: 4px; font-size: 14px; }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>New deal detected on <span th:text="${siteName}">Site</span></h1>
    </div>

    <div class="field">
        <div class="label">Deal</div>
        <div class="value" th:text="${deal.title}">Deal title</div>
    </div>

    <div class="field">
        <div class="label">Confidence</div>
        <span class="badge" th:classappend="${deal.confidence}" th:text="${deal.confidence}">HIGH</span>
    </div>

    <div class="field" th:if="${deal.description}">
        <div class="label">Description</div>
        <div class="value" th:text="${deal.description}">Description</div>
    </div>

    <div class="field" th:if="${deal.discountValue}">
        <div class="label">Discount value</div>
        <div class="value" th:text="${deal.discountValue}">Value</div>
    </div>

    <div class="field" th:if="${deal.expiresAt}">
        <div class="label">Expires</div>
        <div class="value" th:text="${#temporals.format(deal.expiresAt, 'MMM d, yyyy')}">Expiry</div>
    </div>

    <a class="btn" th:href="${siteUrl}" target="_blank">Visit site</a>
</div>
<div class="footer">You are receiving this because you track <span th:text="${siteUrl}">URL</span> on Deal Tracker.</div>
</body>
</html>

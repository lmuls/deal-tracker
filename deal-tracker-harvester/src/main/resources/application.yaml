spring:
  application:
    name: deal-tracker-harvester
  datasource:
    url: jdbc:postgresql://localhost:5432/dealtracker
    username: dealtracker
    password: dealtracker
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

harvester:
  snapshot-dir: /data/snapshots
  max-retries: 3
  initial-backoff: PT2S
  backoff-multiplier: 2.0
  robots-cache-ttl: PT24H
  http-timeout: PT15S
  user-agent: "DealTrackerBot/1.0"
